name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build --workspace @privateclaw/protocol
      - run: npm run build --workspace @privateclaw/privateclaw
      - run: npm run test --workspace @privateclaw/protocol
      - run: npm run test --workspace @privateclaw/privateclaw
      - run: npm publish --workspace @privateclaw/privateclaw --access public
