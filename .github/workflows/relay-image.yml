name: Build relay image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/relay-image.yml"
      - ".dockerignore"
      - "Dockerfile.multiarch"
      - "Dockerfile.multiarch.redis"
      - "compose.yaml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "packages/privateclaw-protocol/**"
      - "services/relay-server/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/relay-image.yml"
      - ".dockerignore"
      - "Dockerfile.multiarch"
      - "Dockerfile.multiarch.redis"
      - "compose.yaml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "packages/privateclaw-protocol/**"
      - "services/relay-server/**"

permissions:
  contents: read
  packages: write

jobs:
  relay-image:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/privateclaw-relay
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=v(.*),group=1

      - name: Build and publish relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.multiarch
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
