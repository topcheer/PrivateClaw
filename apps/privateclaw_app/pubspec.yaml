name: privateclaw_app
description: "PrivateClaw ephemeral encrypted chat client"
publish_to: 'none'
version: 0.1.0+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cryptography: ^2.7.0
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.7
  flutter_markdown: ^0.7.7+1
  intl: ^0.20.2
  just_audio: ^0.10.5
  mobile_scanner: ^7.1.1
  path_provider: ^2.1.5
  video_player: ^2.10.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/privateclaw_app_icon.png
  adaptive_icon_background: '#121A3A'
  adaptive_icon_foreground: assets/branding/privateclaw_app_icon_foreground.png
  remove_alpha_ios: true
  min_sdk_android: 21
