name: privateclaw_app
description: "PrivateClaw ephemeral encrypted chat client"
publish_to: 'none'
version: 0.1.9+70211504
environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cryptography: ^2.7.0
  cupertino_icons: ^1.0.8
  firebase_core: 4.3.0
  firebase_messaging: 16.1.0
  file_picker: ^8.1.7
  flutter_markdown: ^0.7.7+1
  image_picker: ^1.1.2
  intl: ^0.20.2
  just_audio: ^0.10.5
  mobile_scanner:
    path: plugins/mobile_scanner
  path_provider: ^2.1.5
  photo_manager: ^3.7.1
  privateclaw_local_notifications:
    path: plugins/privateclaw_local_notifications
  video_player: ^2.10.0
  web_socket_channel: ^3.0.3
  qr_flutter: ^4.1.0
  quick_actions: ^1.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

dependency_overrides:
  # Keep the vendored pre-objective_c PathProvider implementation, but disable
  # its iOS plugin registration because some older iOS runtimes crash inside
  # the Swift registrar path during app launch. Runner provides the matching
  # iOS Pigeon channels directly.
  path_provider_foundation:
    path: plugins/path_provider_foundation

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/privateclaw_app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/privateclaw_app_icon.png
  adaptive_icon_background: '#121A3A'
  adaptive_icon_foreground: assets/branding/privateclaw_app_icon_foreground.png
  remove_alpha_ios: true
  min_sdk_android: 21
