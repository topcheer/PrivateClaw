name: privateclaw_app
description: "PrivateClaw ephemeral encrypted chat client"
publish_to: 'none'
version: 0.1.16+70864490
environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cryptography: ^2.7.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  file_picker: ^10.3.10
  image_picker: ^1.1.2
  intl: ^0.20.2
  just_audio: ^0.10.5
  mobile_scanner:
    path: plugins/mobile_scanner
  path_provider: ^2.1.5
  photo_manager: ^3.7.1
  privateclaw_local_notifications:
    path: plugins/privateclaw_local_notifications
  video_player: ^2.10.0
  web_socket_channel: ^3.0.3
  qr_flutter: ^4.1.0
  quick_actions: ^1.1.0
  url_launcher: ^6.3.2
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  msix: ^3.16.13

dependency_overrides:
  # Keep the vendored pre-objective_c PathProvider implementation, but disable
  # its iOS plugin registration because some older iOS runtimes crash inside
  # the Swift registrar path during app launch. Runner provides the matching
  # iOS Pigeon channels directly.
  path_provider_foundation:
    path: plugins/path_provider_foundation

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/privateclaw_app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/privateclaw_app_icon.png
  adaptive_icon_background: '#121A3A'
  adaptive_icon_foreground: assets/branding/privateclaw_app_icon_foreground.png
  remove_alpha_ios: true
  min_sdk_android: 21

msix_config:
  display_name: PrivateClaw
  publisher_display_name: GuangGuang AI Studio
  identity_name: GuangGuangAIStudio.PrivateClaw
  publisher: CN=C2C7AF54-16DE-44AC-9393-7EA6D433CCD2
  logo_path: assets/branding/privateclaw_app_icon.png
  capabilities: internetClient,microphone
  languages: en-us,zh-cn,zh-tw
  store: true
  sign_msix: false
  install_certificate: false
  output_path: builds/windows-store
