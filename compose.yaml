services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.multiarch
    ports:
      - "8787:8787"
    environment:
      PRIVATECLAW_RELAY_HOST: 0.0.0.0
      PRIVATECLAW_RELAY_PORT: 8787
      PRIVATECLAW_SESSION_TTL_MS: ${PRIVATECLAW_SESSION_TTL_MS:-900000}
      PRIVATECLAW_FRAME_CACHE_SIZE: ${PRIVATECLAW_FRAME_CACHE_SIZE:-25}
      PRIVATECLAW_REDIS_URL: ${PRIVATECLAW_REDIS_URL:-}
      PRIVATECLAW_ADMIN_TOKEN: ${PRIVATECLAW_ADMIN_TOKEN:-}
      PRIVATECLAW_FCM_SERVICE_ACCOUNT_JSON: ${PRIVATECLAW_FCM_SERVICE_ACCOUNT_JSON:-}
      PRIVATECLAW_FCM_PROJECT_ID: ${PRIVATECLAW_FCM_PROJECT_ID:-}
      PRIVATECLAW_FCM_CLIENT_EMAIL: ${PRIVATECLAW_FCM_CLIENT_EMAIL:-}
      PRIVATECLAW_FCM_PRIVATE_KEY: ${PRIVATECLAW_FCM_PRIVATE_KEY:-}

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
